<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小組照片抽籤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 3D 翻牌效果 CSS */
        .flip-container {
            perspective: 1000px;
        }
        .flipper {
            transition: 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .front, .back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .front {
            z-index: 2;
            transform: rotateY(0deg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .back {
            transform: rotateY(180deg);
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }
        
        .back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- 頂部標題與控制區 -->
    <header class="w-full max-w-6xl flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm">
        <div>
            <h1 class="text-3xl font-black text-gray-800 tracking-wider">🎲 小組照片抽籤系統</h1>
            <p class="text-gray-500 mt-2 text-sm">點擊下方按鈕，為各組隨機分配一張專屬照片</p>
        </div>
        <button onclick="toggleSettings()" class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            自訂設定
        </button>
    </header>

    <!-- 抽籤卡片顯示區 -->
    <main class="w-full max-w-6xl grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-12" id="cardContainer">
        <!-- 卡片將由 JavaScript 動態生成 -->
    </main>

    <!-- 操作按鈕 -->
    <div class="flex gap-4">
        <button id="drawBtn" onclick="startDraw()" class="px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all">
            開始抽籤
        </button>
        <button id="resetBtn" onclick="resetDraw()" class="hidden px-10 py-4 bg-white hover:bg-gray-50 text-indigo-600 text-xl font-bold rounded-xl shadow border border-indigo-100 transition-all">
            重新配對
        </button>
    </div>

    <!-- 設定 Modal (預設隱藏) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">設定組別與照片</h2>
            
            <!-- 新增：組別數量設定 -->
            <div class="mb-8 bg-gray-50 p-4 rounded-xl border border-gray-100">
                <label class="block text-base font-semibold text-gray-700 mb-2">請選擇組別數量 (2 ~ 10 組)</label>
                <select id="groupCountSelect" onchange="updateGroupCount()" class="w-full md:w-1/3 border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2 text-base bg-white">
                    <option value="2">2 組</option>
                    <option value="3">3 組</option>
                    <option value="4">4 組</option>
                    <option value="5" selected>5 組</option>
                    <option value="6">6 組</option>
                    <option value="7">7 組</option>
                    <option value="8">8 組</option>
                    <option value="9">9 組</option>
                    <option value="10">10 組</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 組別設定 -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">組別名稱</h3>
                    <div id="groupInputs" class="space-y-3">
                        <!-- 由 JS 產生 5 個輸入框 -->
                    </div>
                </div>
                
                <!-- 照片設定 (已修改為上傳按鈕) -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">自訂照片上傳</h3>
                    <div id="photoInputs" class="space-y-3">
                        <!-- 由 JS 產生 5 個上傳元件 -->
                    </div>
                    <p class="text-xs text-gray-500 mt-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        💡 <b>提示：</b>點擊按鈕可直接從手機相簿或電腦選擇照片。建議使用長寬比例相近的照片，顯示效果較佳。
                    </p>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3 border-t pt-6">
                <button onclick="toggleSettings()" class="px-5 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition-colors">儲存並套用</button>
            </div>
        </div>
    </div>

    <script>
        // 預設資料：5 個組別，照片改為空陣列
        let groupCount = 5;
        let groups = ['第一組', '第二組', '第三組', '第四組', '第五組'];
        let photos = ['', '', '', '', '']; // 預設沒有照片
        
        // 預設的小圖片圖示 (SVG Data URI)
        const placeholderIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239ca3af'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z'/%3E%3C/svg%3E";

        let isDrawn = false;

        // 初始化頁面
        function init() {
            renderCards();
            renderSettings();
            preloadImages();
        }

        // 預載圖片以確保翻牌時不延遲
        function preloadImages() {
            photos.forEach(url => {
                if (url) {
                    const img = new Image();
                    img.src = url;
                }
            });
        }

        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            groups.forEach((groupName, index) => {
                const cardHTML = `
                    <div class="flip-container h-80 w-full" id="card-${index}">
                        <div class="flipper">
                            <div class="front">
                                <div class="text-4xl mb-4 opacity-50">❓</div>
                                <h3 class="text-2xl font-bold text-center px-2">${groupName}</h3>
                                <p class="text-sm mt-2 opacity-80">等待抽籤...</p>
                            </div>
                            <div class="back relative group">
                                <img src="" alt="Assigned Photo" id="photo-${index}" onerror="this.src='https://via.placeholder.com/600x800?text=圖片載入失敗'">
                                <!-- 遮罩與組別名稱 (覆蓋在圖片上方) -->
                                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                                <div class="absolute bottom-0 left-0 w-full p-4 transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                    <span class="inline-block px-3 py-1 bg-white/20 backdrop-blur-md text-white font-bold rounded-lg border border-white/30 shadow-lg">
                                        🎉 ${groupName}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Fisher-Yates 洗牌演算法 (隨機打亂陣列)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 開始抽籤
        function startDraw() {
            if (isDrawn) return;
            
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');
            
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
            drawBtn.innerText = '抽籤中...';

            // 打亂照片陣列
            const shuffledPhotos = shuffleArray(photos);

            // 依序翻開卡片
            groups.forEach((_, index) => {
                setTimeout(() => {
                    // 將隨機分配的照片設定到卡片背面，如果還沒上傳，顯示一張提示圖
                    const photoSrc = shuffledPhotos[index] || 'https://placehold.co/600x800/e2e8f0/64748b?text=尚未上傳照片';
                    document.getElementById(`photo-${index}`).src = photoSrc;
                    // 觸發翻牌動畫
                    document.getElementById(`card-${index}`).classList.add('flipped');
                    
                    // 當最後一張翻完時，更新按鈕狀態
                    if (index === groups.length - 1) {
                        setTimeout(() => {
                            isDrawn = true;
                            drawBtn.classList.add('hidden');
                            resetBtn.classList.remove('hidden');
                            drawBtn.disabled = false;
                            drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            drawBtn.innerText = '開始抽籤';
                        }, 600);
                    }
                }, index * 400); // 每張卡片間隔 400 毫秒翻開
            });
        }

        // 重新抽籤 (重置)
        function resetDraw() {
            groups.forEach((_, index) => {
                document.getElementById(`card-${index}`).classList.remove('flipped');
            });

            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            // 等待翻牌動畫結束後再清除圖片
            setTimeout(() => {
                groups.forEach((_, index) => {
                    document.getElementById(`photo-${index}`).src = '';
                });
                isDrawn = false;
                resetBtn.classList.add('hidden');
                drawBtn.classList.remove('hidden');
            }, 600);
        }

        // 開關設定 Modal
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('hidden')) {
                renderSettings(); // 打開時重新載入最新設定值
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        // 當使用者改變組別數量時觸發
        function updateGroupCount() {
            // 先儲存目前已經輸入的資料，避免切換數量時被清空
            syncSettingsToState();

            const newCount = parseInt(document.getElementById('groupCountSelect').value);
            
            if (newCount > groupCount) {
                // 如果變多，增加預設組別名稱與空照片
                for (let i = groupCount; i < newCount; i++) {
                    groups.push(`第 ${i + 1} 組`);
                    photos.push('');
                }
            } else if (newCount < groupCount) {
                // 如果變少，截斷陣列
                groups = groups.slice(0, newCount);
                photos = photos.slice(0, newCount);
            }
            
            groupCount = newCount;
            renderSettings(); // 重新渲染設定欄位
        }

        // 將設定視窗內的輸入值同步到陣列中
        function syncSettingsToState() {
            for (let i = 0; i < groupCount; i++) {
                const groupInput = document.getElementById(`input-group-${i}`);
                const previewPhoto = document.getElementById(`preview-photo-${i}`);
                
                if (groupInput) {
                    groups[i] = groupInput.value.trim() || `第 ${i + 1} 組`;
                }
                
                if (previewPhoto) {
                    const newPhotoSrc = previewPhoto.src;
                    photos[i] = newPhotoSrc.includes('data:image/svg+xml') ? '' : newPhotoSrc;
                }
            }
        }

        // 渲染設定欄位
        function renderSettings() {
            // 確保數量下拉選單與變數一致
            const selectEl = document.getElementById('groupCountSelect');
            if (selectEl) selectEl.value = groupCount;

            const groupInputs = document.getElementById('groupInputs');
            const photoInputs = document.getElementById('photoInputs');
            
            groupInputs.innerHTML = '';
            photoInputs.innerHTML = '';

            for (let i = 0; i < groupCount; i++) {
                // 組別輸入框
                groupInputs.innerHTML += `
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">第 ${i + 1} 組</label>
                        <input type="text" id="input-group-${i}" value="${groups[i]}" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2 text-sm">
                    </div>
                `;
                
                // 照片上傳區塊 (包含預覽與上傳按鈕)
                // 如果沒有照片，顯示預設圖示並調整樣式
                const imgSrc = photos[i] || placeholderIcon;
                const imgClass = photos[i] ? 'w-full h-full object-cover' : 'w-full h-full object-cover p-2 opacity-50';

                photoInputs.innerHTML += `
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">照片 ${i + 1}</label>
                        <div class="flex items-center gap-3">
                            <!-- 小縮圖預覽 -->
                            <div class="w-12 h-12 rounded-lg bg-gray-100 overflow-hidden shrink-0 border border-gray-200 flex items-center justify-center">
                                <img id="preview-photo-${i}" src="${imgSrc}" class="${imgClass}">
                            </div>
                            <!-- 隱藏的檔案輸入框與觸發的 Label 按鈕 -->
                            <div class="flex-1">
                                <input type="file" id="input-file-${i}" accept="image/*" class="hidden" onchange="handleFileUpload(event, ${i})">
                                <label for="input-file-${i}" class="cursor-pointer flex items-center justify-center w-full px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                                    選擇相簿/檔案
                                </label>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // 處理照片上傳事件
        function handleFileUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                // 使用 FileReader 讀取圖片檔案，轉換成 Base64 格式
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 將讀取完畢的圖片內容替換到預覽縮圖的 src 屬性上
                    const img = document.getElementById(`preview-photo-${index}`);
                    img.src = e.target.result;
                    img.className = 'w-full h-full object-cover'; // 移除預設圖示的邊距與透明度
                };
                reader.readAsDataURL(file);
            }
        }

        // 儲存設定
        function saveSettings() {
            // 同步最新的輸入狀態
            syncSettingsToState();
            
            toggleSettings();
            resetDraw();
            // 短暫延遲確保 reset 動畫不受影響，然後重新渲染卡片名稱
            setTimeout(() => {
                renderCards();
                preloadImages(); // 重新預載更新後的圖片
            }, 600);
        }

        // 啟動程式
        window.onload = init;
    </script>
</body>
</html>
