<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>順序抽籤工具</title>
    <style>
        /* ================= 離線版專用 CSS 設計 ================= */
        :root {
            --primary: #4f46e5;     /* 靛藍色主題 */
            --primary-dark: #3730a3;
            --primary-light: #e0e7ff;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding-bottom: 40px;
        }

        /* 標題區塊 */
        .header {
            background-color: var(--card-bg);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--text-main);
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 按鈕設計 */
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-outline {
            background-color: var(--primary-light);
            color: var(--primary-dark);
            border: 1px solid #c7d2fe;
        }
        .btn-outline:hover { background-color: #c7d2fe; }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            font-size: 22px;
            padding: 15px 50px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            border-radius: 50px;
        }
        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }

        /* 順序列表區塊 */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-item {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
        }

        .list-item.highlight {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
            border-color: var(--primary);
            background-color: #f8fafc;
            z-index: 10;
            position: relative;
        }

        /* 名次數字設計 */
        .rank-badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-right: 20px;
            flex-shrink: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            background: var(--primary); /* 預設顏色 */
        }

        /* 為前三名加上特別顏色 */
        .rank-1 .rank-badge { background: linear-gradient(135deg, #fbbf24, #d97706); } /* 金牌 */
        .rank-2 .rank-badge { background: linear-gradient(135deg, #94a3b8, #475569); } /* 銀牌 */
        .rank-3 .rank-badge { background: linear-gradient(135deg, #d97706, #92400e); } /* 銅牌 */

        .group-name {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-main);
            flex-grow: 1;
            text-align: center;
            letter-spacing: 2px;
        }

        .status-icon {
            font-size: 28px;
            width: 40px;
            text-align: right;
        }

        /* 快速跳動的模糊特效 */
        .blur-text {
            filter: blur(2px);
            opacity: 0.7;
        }

        /* 複製結果區塊 */
        .result-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h3 {
            margin: 0;
            font-size: 18px;
            color: var(--text-main);
        }

        .result-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            color: var(--text-main);
            background-color: #f8fafc;
            resize: none; /* 禁止手動調整大小，由 JS 控制 */
            box-sizing: border-box;
            line-height: 1.5;
        }

        .result-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 設定彈跳視窗 Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .modal-header h2 { margin: 0; font-size: 22px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #9ca3af; }

        .modal-body {
            overflow-y: auto;
            padding-right: 10px;
            flex-grow: 1;
        }

        /* 捲軸美化 */
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px; font-weight: bold;}
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            background-color: white;
        }
        .input-group select {
            cursor: pointer;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin: 20px 0;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部標題區 -->
        <header class="header">
            <div>
                <h1>順序抽籤工具</h1>
                <p>點擊下方按鈕，隨機決定上場與排列順序！</p>
            </div>
            <button onclick="toggleSettings()" class="btn btn-outline">
                ⚙️ 抽籤設定
            </button>
        </header>

        <!-- 順序列表區 -->
        <main class="list-container" id="listContainer">
            <!-- 內容由 JS 動態生成 -->
        </main>

        <!-- 操作按鈕 -->
        <div class="action-buttons">
            <button id="drawBtn" onclick="startDraw()" class="btn btn-primary">
                🎲 開始抽籤
            </button>
            <button id="resetBtn" onclick="resetDraw()" class="btn btn-primary hidden" style="background-color: #f59e0b;">
                🔄 重新抽籤
            </button>
        </div>

        <!-- 複製結果區塊 (預設隱藏) -->
        <div id="resultContainer" class="result-container hidden">
            <div class="result-header">
                <h3>📝 抽籤結果</h3>
                <button onclick="copyResult()" class="btn btn-outline" id="copyBtn" style="font-size: 14px; padding: 8px 16px;">
                    📋 複製結果
                </button>
            </div>
            <textarea id="resultText" class="result-textarea" readonly></textarea>
        </div>
    </div>

    <!-- 設定 Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 抽籤設定</h2>
                <button onclick="toggleSettings()" class="close-btn">✖</button>
            </div>

            <div class="modal-body">
                <!-- 數量設定 (改為下拉選單) -->
                <div class="input-group">
                    <label for="itemCount">參與數量:</label>
                    <select id="itemCount" onchange="generateSettingsInputs()">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5" selected>5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div class="divider"></div>

                <!-- 名稱設定 -->
                <div id="groupInputs">
                    <!-- 由 JS 產生輸入框 -->
                </div>
            </div>

            <div class="modal-footer">
                <button onclick="toggleSettings()" class="btn" style="background: #f1f5f9; color: #475569;">取消</button>
                <button onclick="saveSettings()" class="btn btn-primary" style="padding: 10px 20px; font-size: 16px;">儲存設定</button>
            </div>
        </div>
    </div>

    <script>
        // 預設名單
        let items = ['組別 1', '組別 2', '組別 3', '組別 4', '組別 5'];
        let currentFinalOrder = []; // 儲存最後抽出來的順序
        let isDrawing = false;
        let intervals = []; 

        function init() {
            renderList();
            generateSettingsInputs(); 
        }

        // 渲染列表
        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            items.forEach((item, i) => {
                let rankLabel = i + 1;
                let medal = '';
                if (i === 0) medal = '🥇';
                if (i === 1) medal = '🥈';
                if (i === 2) medal = '🥉';

                const itemHTML = `
                    <div class="list-item rank-${i + 1}" id="row-${i}">
                        <div class="rank-badge">${rankLabel}</div>
                        <div class="group-name" id="name-${i}">？？？</div>
                        <div class="status-icon" id="icon-${i}">${medal}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
        }

        // 洗牌演算法
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 開始抽籤動畫
        function startDraw() {
            if (isDrawing) return;
            isDrawing = true;

            const drawBtn = document.getElementById('drawBtn');
            drawBtn.disabled = true;
            drawBtn.innerHTML = '⏳ 決定順序中...';

            // 隱藏複製結果區塊
            document.getElementById('resultContainer').classList.add('hidden');

            // 1. 先決定好最終的順序並存入全域變數
            currentFinalOrder = shuffleArray(items);

            // 2. 清除之前的狀態
            for (let i = 0; i < items.length; i++) {
                document.getElementById(`row-${i}`).classList.remove('highlight');
                document.getElementById(`name-${i}`).classList.add('blur-text');
            }

            // 3. 開始跑馬燈
            intervals = [];
            for (let i = 0; i < items.length; i++) {
                let interval = setInterval(() => {
                    const randomName = items[Math.floor(Math.random() * items.length)];
                    document.getElementById(`name-${i}`).innerText = randomName;
                }, 80);
                intervals.push(interval);
            }

            // 4. 依序定格揭曉結果
            for (let i = 0; i < items.length; i++) {
                let delay = items.length > 5 ? 600 : 800; 
                let revealTime = 1000 + (i * delay);

                setTimeout(() => {
                    clearInterval(intervals[i]);

                    const nameEl = document.getElementById(`name-${i}`);
                    nameEl.innerText = currentFinalOrder[i];
                    nameEl.classList.remove('blur-text');

                    const rowEl = document.getElementById(`row-${i}`);
                    rowEl.classList.add('highlight');

                    rowEl.style.transform = 'scale(1.05)';
                    setTimeout(() => { rowEl.style.transform = ''; }, 200);

                    // 當最後一個也揭曉完畢時
                    if (i === items.length - 1) {
                        finishDraw();
                    }
                }, revealTime);
            }
        }

        // 抽籤結束的處理
        function finishDraw() {
            isDrawing = false;
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            drawBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            drawBtn.disabled = false;
            drawBtn.innerHTML = '🎲 開始抽籤';

            // 產生並顯示文字結果
            showTextResult();
        }

        // 顯示文字結果區塊
        function showTextResult() {
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');
            
            // 組合純文字內容
            let textOutput = '';
            currentFinalOrder.forEach((item, index) => {
                textOutput += `${index + 1}. ${item}\n`;
            });
            
            // 填入 textarea 並根據行數自動調整高度
            resultText.value = textOutput.trim();
            resultText.rows = currentFinalOrder.length;
            
            // 顯示區塊並滑動到最底下
            resultContainer.classList.remove('hidden');
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        // 複製結果到剪貼簿
        function copyResult() {
            const resultText = document.getElementById('resultText');
            const copyBtn = document.getElementById('copyBtn');
            
            // 選取文字並複製 (相容 iFrame 環境)
            resultText.select();
            resultText.setSelectionRange(0, 99999); // 針對手機的相容性
            document.execCommand("copy");
            
            // 取消選取狀態
            window.getSelection().removeAllRanges();

            // 變更按鈕文字給予回饋
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '✅ 已複製！';
            copyBtn.style.backgroundColor = '#10b981'; /* 綠色回饋 */
            copyBtn.style.color = 'white';
            copyBtn.style.borderColor = '#10b981';
            
            // 兩秒後恢復原狀
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.style.backgroundColor = '';
                copyBtn.style.color = '';
                copyBtn.style.borderColor = '';
            }, 2000);
        }

        // 重新抽籤 (蓋牌)
        function resetDraw() {
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            resetBtn.classList.add('hidden');
            drawBtn.classList.remove('hidden');
            
            // 隱藏複製結果區塊
            document.getElementById('resultContainer').classList.add('hidden');

            for (let i = 0; i < items.length; i++) {
                document.getElementById(`row-${i}`).classList.remove('highlight');
                document.getElementById(`name-${i}`).innerText = '？？？';
                document.getElementById(`name-${i}`).classList.remove('blur-text');
            }
            
            // 滾動回最上方
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- 以下為設定 Modal 邏輯 ---
        function toggleSettings() {
            if (isDrawing) return;

            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('itemCount').value = items.length;
                generateSettingsInputs();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function generateSettingsInputs() {
            const groupInputs = document.getElementById('groupInputs');
            const countInput = document.getElementById('itemCount');
            let count = parseInt(countInput.value);

            groupInputs.innerHTML = '';
            for (let i = 0; i < count; i++) {
                let defaultName = items[i] !== undefined ? items[i] : `組別 ${i + 1}`;
                groupInputs.innerHTML += `
                    <div class="input-group">
                        <label>名單 ${i + 1}</label>
                        <input type="text" id="input-group-${i}" value="${defaultName}" placeholder="請輸入名稱">
                    </div>
                `;
            }
        }

        function saveSettings() {
            let count = parseInt(document.getElementById('itemCount').value);
            let newItems = [];
            
            for (let i = 0; i < count; i++) {
                const inputEl = document.getElementById(`input-group-${i}`);
                const newName = inputEl.value.trim();
                newItems.push(newName || `組別 ${i + 1}`);
            }

            items = newItems;
            toggleSettings();
            renderList();
            
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.classList.add('hidden');
            drawBtn.classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
